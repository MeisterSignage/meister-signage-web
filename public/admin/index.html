<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Meister Signage — Admin</title>
    <link rel="icon" href="/favicon.ico" />
    <style>
      html, body { margin: 0; height: 100%; background: #0d1628; color: #f3f4f6; font-family: 'Lato', system-ui, sans-serif; }
      #__decap_loading {
        position: fixed; inset: 0; display: grid; place-items: center; text-align: center; gap: 12px;
      }
      #__decap_loading .kicker {
        font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.18em;
        color: rgba(254,1,154,0.85);
      }
      #__decap_loading .title {
        font-size: 24px; font-weight: 300; letter-spacing: -0.02em;
      }
      #__decap_loading .meta {
        font-size: 12px; color: rgba(156,163,175,0.7);
      }
    </style>
  </head>
  <body>
    <div id="__decap_loading">
      <div>
        <div class="kicker">Meister Signage · Admin</div>
        <div class="title">Editor wird geladen …</div>
        <div class="meta">Falls dies länger als 10&nbsp;Sekunden dauert, Seite neu laden.</div>
      </div>
    </div>
    <!-- Decap CMS, pinned major version -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      // Hide loading shell once Decap mounts.
      window.addEventListener("load", () => {
        const t = setInterval(() => {
          if (document.querySelector("[class*=Sidebar]")) {
            const el = document.getElementById("__decap_loading");
            if (el) el.remove();
            clearInterval(t);
          }
        }, 200);
      });
    </script>
  </body>
</html>
