    extension: "json"
    format: "json"
    slug: "{{slug}}"
    summary: "{{h1}}"
    sortable_fields: ["h1", "slug"]
    fields:
      - { label: "Slug (URL-Pfad)", name: "slug", widget: "string", hint: "Wird zur URL: /branchen/<slug>." }
      - { label: "Typ", name: "type", widget: "hidden", default: "branchen" }
      - { label: "SEO Titel",          name: "seoTitle",       widget: "string" }
      - { label: "SEO Beschreibung",   name: "seoDescription", widget: "text" }
      - { label: "Eyebrow",            name: "eyebrow",        widget: "string" }
      - { label: "Headline (H1)",      name: "h1",             widget: "string" }
      - { label: "Intro-Text",         name: "intro",          widget: "text" }
      - { label: "Hero-Bild",          name: "heroImage",      widget: "image", required: false }
      - label: "Vorteile / Benefits"
        name: "benefits"
        widget: "list"
        fields:
          - { label: "Titel",        name: "title",       widget: "string" }
          - { label: "Beschreibung", name: "description", widget: "text" }
      - label: "FAQ"
        name: "faq"
        widget: "list"
        fields:
          - { label: "Frage",   name: "question", widget: "string" }
          - { label: "Antwort", name: "answer",   widget: "text" }
      - label: "Interne Links"
        name: "internalLinks"
        widget: "list"
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "URL",   name: "href",  widget: "string" }
      - label: "Call-to-Action"
        name: "cta"
        widget: "object"
        fields:
          - { label: "Eyebrow",                name: "eyebrow",        widget: "string" }
          - { label: "Titel",                  name: "title",          widget: "string" }
          - { label: "Untertitel",             name: "subtitle",       widget: "text" }
          - { label: "Primärer Button — Text", name: "primaryLabel",   widget: "string" }
          - { label: "Primärer Button — URL",  name: "primaryHref",    widget: "string" }
          - { label: "Zweiter Button — Text",  name: "secondaryLabel", widget: "string", required: false }
          - { label: "Zweiter Button — URL",   name: "secondaryHref",  widget: "string", required: false }
      - label: "Verwandte Seiten"
        name: "related"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - label: "Verwandte Branchen"
            name: "branchen"
            widget: "list"
            required: false
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL",   name: "href",  widget: "string" }
          - label: "Verwandte Lösungen"
            name: "loesungen"
            widget: "list"
            required: false
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL",   name: "href",  widget: "string" }
          - label: "Verwandte Städte"
            name: "staedte"
            widget: "list"
            required: false
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL",   name: "href",  widget: "string" }

  # ───────────────────────────────────────────────────────────────
  # STÄDTE
  # ───────────────────────────────────────────────────────────────
  - name: "staedte"
    label: "Städte"
    label_singular: "Städteseite"
    folder: "content/landingpages/staedte"
    create: true
    delete: true
    extension: "json"
    format: "json"
    slug: "{{slug}}"
    summary: "{{h1}}"
    sortable_fields: ["h1", "slug"]
    fields:
      - { label: "Slug (URL-Pfad)", name: "slug", widget: "string", hint: "Wird zur URL: /staedte/<slug>." }
      - { label: "Typ", name: "type", widget: "hidden", default: "staedte" }
      - { label: "SEO Titel",          name: "seoTitle",       widget: "string" }
      - { label: "SEO Beschreibung",   name: "seoDescription", widget: "text" }
      - { label: "Eyebrow",            name: "eyebrow",        widget: "string" }
      - { label: "Headline (H1)",      name: "h1",             widget: "string" }
      - { label: "Intro-Text",         name: "intro",          widget: "text" }
      - { label: "Hero-Bild",          name: "heroImage",      widget: "image", required: false }
      - label: "Vorteile / Benefits"
        name: "benefits"
        widget: "list"
        fields:
          - { label: "Titel",        name: "title",       widget: "string" }
          - { label: "Beschreibung", name: "description", widget: "text" }
      - label: "FAQ"
        name: "faq"
        widget: "list"
        fields:
          - { label: "Frage",   name: "question", widget: "string" }
          - { label: "Antwort", name: "answer",   widget: "text" }
      - label: "Interne Links"
        name: "internalLinks"
        widget: "list"
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "URL",   name: "href",  widget: "string" }
      - label: "Call-to-Action"
        name: "cta"
        widget: "object"
        fields:
          - { label: "Eyebrow",                name: "eyebrow",        widget: "string" }
          - { label: "Titel",                  name: "title",          widget: "string" }
          - { label: "Untertitel",             name: "subtitle",       widget: "text" }
          - { label: "Primärer Button — Text", name: "primaryLabel",   widget: "string" }
          - { label: "Primärer Button — URL",  name: "primaryHref",    widget: "string" }
          - { label: "Zweiter Button — Text",  name: "secondaryLabel", widget: "string", required: false }
          - { label: "Zweiter Button — URL",   name: "secondaryHref",  widget: "string", required: false }
      - label: "Verwandte Seiten"
        name: "related"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - label: "Verwandte Branchen"
            name: "branchen"
            widget: "list"
            required: false
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL",   name: "href",  widget: "string" }
          - label: "Verwandte Lösungen"
            name: "loesungen"
            widget: "list"
            required: false
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL",   name: "href",  widget: "string" }
          - label: "Verwandte Städte"
            name: "staedte"
            widget: "list"
            required: false
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL",   name: "href",  widget: "string" }

  # ───────────────────────────────────────────────────────────────
  # WISSEN
  # ───────────────────────────────────────────────────────────────
  - name: "wissen"
    label: "Wissen / Ratgeber"
    label_singular: "Wissensartikel"
    folder: "content/wissen"
    create: true
    delete: true
    extension: "json"
    format: "json"
    slug: "{{slug}}"
    summary: "{{h1}}"
    sortable_fields: ["h1", "datePublished"]
    fields:
      - { label: "Slug (URL-Pfad)", name: "slug", widget: "string", hint: "Wird zur URL: /wissen/<slug>." }
      - label: "Kategorie"
        name: "category"
        widget: "select"
        options: ["Grundlagen", "Software", "Kosten", "Branchen", "Outdoor & Mobile", "Events"]
      - { label: "SEO Titel",          name: "seoTitle",       widget: "string" }
      - { label: "SEO Beschreibung",   name: "seoDescription", widget: "text" }
      - { label: "Eyebrow",            name: "eyebrow",        widget: "string" }
      - { label: "Headline (H1)",      name: "h1",             widget: "string" }
      - { label: "Intro",              name: "intro",          widget: "text" }
      - { label: "In-Kürze / Definition", name: "definition", widget: "text", hint: "1–2 Sätze, farbiger Block oben." }
      - label: "Erklärungs-Absätze"
        name: "explanation"
        widget: "list"
        field: { label: "Absatz", name: "text", widget: "text" }
      - label: "Beispiele"
        name: "examples"
        widget: "list"
        fields:
          - { label: "Titel",        name: "title",       widget: "string" }
          - { label: "Beschreibung", name: "description", widget: "text" }
      - label: "Vorteile (Checkliste)"
        name: "benefits"
        widget: "list"
        field: { label: "Vorteil", name: "text", widget: "string" }
      - label: "FAQ"
        name: "faq"
        widget: "list"
        fields:
          - { label: "Frage",   name: "question", widget: "string" }
          - { label: "Antwort", name: "answer",   widget: "text" }
      - label: "Interne Links"
        name: "internalLinks"
        widget: "list"
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "URL",   name: "href",  widget: "string" }
      - { label: "Veröffentlichungsdatum", name: "datePublished", widget: "date", date_format: "YYYY-MM-DD" }
      - { label: "Letzte Änderung",        name: "dateModified",  widget: "date", date_format: "YYYY-MM-DD", required: false }

  # ───────────────────────────────────────────────────────────────
  # GLOBALE DATEN
  # ───────────────────────────────────────────────────────────────
  - name: "site"
    label: "Globale Daten"
    files:
      - file: "content/site/contact.json"
        label: "Kontaktdaten"
        name: "contact"
        format: "json"
        fields:
          - { label: "Ansprechperson — Name",  name: "name",         widget: "string" }
          - { label: "Ansprechperson — Rolle", name: "role",         widget: "string" }
          - { label: "Telefon (E.164)",        name: "phone",        widget: "string" }
          - { label: "Telefon (Anzeige)",      name: "phoneDisplay", widget: "string" }
          - { label: "E-Mail",                 name: "email",        widget: "string" }
          - { label: "WhatsApp-URL",           name: "whatsapp",     widget: "string" }
      - file: "content/site/homepage.json"
        label: "Homepage-Hero"
        name: "homepage"
        format: "json"
        fields:
          - { label: "Eyebrow",                 name: "eyebrow",         widget: "string" }
          - { label: "Headline Zeile 1",        name: "titleLine1",      widget: "string" }
          - { label: "Headline Zeile 2 (magenta)", name: "titleLine2",   widget: "string" }
          - { label: "Sub-Text",                name: "subtitle",        widget: "text" }
          - { label: "Primärer CTA — Text",     name: "primaryLabel",    widget: "string" }
          - { label: "Primärer CTA — URL",      name: "primaryHref",     widget: "string" }
          - { label: "Zweiter CTA — Text",      name: "secondaryLabel",  widget: "string", required: false }
          - { label: "Zweiter CTA — URL",       name: "secondaryHref",   widget: "string", required: false }
