# Decap CMS configuration — Meister Signage
#
# Decap erwartet pro Feld ein eigenes Objekt in der `fields:`-Liste.
# YAML-Anker (`*x`) lösen sich zu einer Liste auf und werden von Decap
# nicht erkannt — deshalb sind die LandingPage-Felder unten in jeder
# Collection ausgeschrieben.

backend:
  name: github
  repo: MeisterSignage/meister-signage-web
  branch: main
  base_url: https://meister-signage-cms-auth.lingering-mountain-b769.workers.dev
  auth_endpoint: auth

publish_mode: simple

media_folder: "public/images/news"
public_folder: "/images/news"

# Pre-Launch: Staging-Domain. Beim Launch auf https://www.meister-signage.ch wechseln.
site_url: https://test.meister-signage.ch
display_url: https://test.meister-signage.ch
locale: "de"

collections:
  # ───────────────────────────────────────────────────────────────
  # NEWS — Markdown-Blogbeiträge
  # ───────────────────────────────────────────────────────────────
  - name: "news"
    label: "News & Blog"
    label_singular: "Blogbeitrag"
    folder: "content/news"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{date | date('YYYY-MM-DD')}} · {{title}}"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "Titel",            name: "title",       widget: "string" }
      - { label: "Kurzbeschreibung", name: "description", widget: "text" }
      - { label: "Datum",            name: "date",        widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, picker_utc: false }
      - label: "Kategorie"
        name: "category"
        widget: "select"
        options: ["Produkte", "Branchen", "Anleitungen", "Aktuelles", "Kunden", "Tipps"]
      - { label: "Titelbild", name: "image", widget: "image", required: false }
      - label: "Status"
        name: "status"
        widget: "select"
        default: "draft"
        options:
          - { label: "Entwurf",        value: "draft" }
          - { label: "Veröffentlicht", value: "published" }
      - { label: "Slug", name: "slug", widget: "string", required: false }
      - { label: "Text", name: "body", widget: "markdown" }

  # ───────────────────────────────────────────────────────────────
  # LÖSUNGEN
  # ───────────────────────────────────────────────────────────────
  - name: "loesungen"
    label: "Lösungen"
    label_singular: "Lösungsseite"
    folder: "content/landingpages/loesungen"
    create: true
    delete: true
    extension: "json"
    format: "json"
    slug: "{{slug}}"
    summary: "{{h1}}"
    sortable_fields: ["h1", "slug"]
    fields:
      - { label: "Slug (URL-Pfad)", name: "slug", widget: "string", hint: "Wird zur URL: /loesungen/<slug>." }
      - { label: "Typ", name: "type", widget: "hidden", default: "loesungen" }
      - { label: "SEO Titel",          name: "seoTitle",       widget: "string" }
      - { label: "SEO Beschreibung",   name: "seoDescription", widget: "text" }
      - { label: "Eyebrow",            name: "eyebrow",        widget: "string" }
      - { label: "Headline (H1)",      name: "h1",             widget: "string" }
      - { label: "Intro-Text",         name: "intro",          widget: "text" }
      - { label: "Hero-Bild",          name: "heroImage",      widget: "image", required: false }
      - label: "Vorteile / Benefits"
        name: "benefits"
        widget: "list"
        fields:
          - { label: "Titel",        name: "title",       widget: "string" }
          - { label: "Beschreibung", name: "description", widget: "text" }
      - label: "FAQ"
        name: "faq"
        widget: "list"
        fields:
          - { label: "Frage",   name: "question", widget: "string" }
          - { label: "Antwort", name: "answer",   widget: "text" }
      - label: "Interne Links"
        name: "internalLinks"
        widget: "list"
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "URL",   name: "href",  widget: "string" }
      - label: "Call-to-Action"
        name: "cta"
        widget: "object"
        fields:
          - { label: "Eyebrow",                name: "eyebrow",        widget: "string" }
          - { label: "Titel",                  name: "title",          widget: "string" }
          - { label: "Untertitel",             name: "subtitle",       widget: "text" }
          - { label: "Primärer Button — Text", name: "primaryLabel",   widget: "string" }
          - { label: "Primärer Button — URL",  name: "primaryHref",    widget: "string" }
          - { label: "Zweiter Button — Text",  name: "secondaryLabel", widget: "string", required: false }
          - { label: "Zweiter Button — URL",   name: "secondaryHref",  widget: "string", required: false }
      - label: "Verwandte Seiten"
        name: "related"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - label: "Verwandte Branchen"
            name: "branchen"
            widget: "list"
            required: false
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL",   name: "href",  widget: "string" }
          - label: "Verwandte Lösungen"
            name: "loesungen"
            widget: "list"
            required: false
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL",   name: "href",  widget: "string" }
          - label: "Verwandte Städte"
            name: "staedte"
            widget: "list"
            required: false
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL",   name: "href",  widget: "string" }

  # ───────────────────────────────────────────────────────────────
  # BRANCHEN
  # ───────────────────────────────────────────────────────────────
  - name: "branchen"
    label: "Branchen"
    label_singular: "Branchenseite"
    folder: "content/landingpages/branchen"
    create: true
    delete: true
    extension: "json"
    format: "json"
    slug: "{{slug}}"
    summary: "{{h1}}"
    sortable_fields: ["h1", "slug"]
    fields:
      - { label: "Slug (URL-Pfad)", name: "slug", widget: "string", hint: "Wird zur URL: /branchen/<slug>." }
      - { label: "Typ", name: "type", widget: "hidden", default: "branchen" }
      - { label: "SEO Titel",          name: "seoTitle",       widget: "string" }
      - { label: "SEO Beschreibung",   name: "seoDescription", widget: "text" }
      - { label: "Eyebrow",            name: "eyebrow",        widget: "string" }
      - { label: "Headline (H1)",      name: "h1",             widget: "string" }
      - { label: "Intro-Text",         name: "intro",          widget: "text" }
      - { label: "Hero-Bild",          name: "heroImage",      widget: "image", required: false }
      - label: "Vorteile / Benefits"
        name: "benefits"
        widget: "list"
        fields:
          - { label: "Titel",        name: "title",       widget: "string" }
          - { label: "Beschreibung", name: "description", widget: "text" }
      - label: "FAQ"
        name: "faq"
        widget: "list"
        fields:
          - { label: "Frage",   name: "question", widget: "string" }
          - { label: "Antwort", name: "answer",   widget: "text" }
      - label: "Interne Links"
        name: "internalLinks"
        widget: "list"
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "URL",   name: "href",  widget: "string" }
      - label: "Call-to-Action"
        name: "cta"
        widget: "object"
        fields:
          - { label: "Eyebrow",                name: "eyebrow",        widget: "string" }
          - { label: "Titel",                  name: "title",          widget: "string" }
          - { label: "Untertitel",             name: "subtitle",       widget: "text" }
          - { label: "Primärer Button — Text", name: "primaryLabel",   widget: "string" }
          - { label: "Primärer Button — URL",  name: "primaryHref",    widget: "string" }
          - { label: "Zweiter Button — Text",  name: "secondaryLabel", widget: "string", required: false }
          - { label: "Zweiter Button — URL",   name: "secondaryHref",  widget: "string", required: false }
      - label: "Verwandte Seiten"
        name: "related"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - label: "Verwandte Branchen"
            name: "branchen"
            widget: "list"
            required: false
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL",   name: "href",  widget: "string" }
          - label: "Verwandte Lösungen"
            name: "loesungen"
            widget: "list"
            required: false
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL",   name: "href",  widget: "string" }
          - label: "Verwandte Städte"
            name: "staedte"
            widget: "list"
            required: false
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL",   name: "href",  widget: "string" }

  # ───────────────────────────────────────────────────────────────
  # STÄDTE
  # ───────────────────────────────────────────────────────────────
  - name: "staedte"
    label: "Städte"
    label_singular: "Städteseite"
    folder: "content/landingpages/staedte"
    create: true
    delete: true
    extension: "json"
    format: "json"
    slug: "{{slug}}"
    summary: "{{h1}}"
    sortable_fields: ["h1", "slug"]
    fields:
      - { label: "Slug (URL-Pfad)", name: "slug", widget: "string", hint: "Wird zur URL: /staedte/<slug>." }
      - { label: "Typ", name: "type", widget: "hidden", default: "staedte" }
      - { label: "SEO Titel",          name: "seoTitle",       widget: "string" }
      - { label: "SEO Beschreibung",   name: "seoDescription", widget: "text" }
      - { label: "Eyebrow",            name: "eyebrow",        widget: "string" }
      - { label: "Headline (H1)",      name: "h1",             widget: "string" }
      - { label: "Intro-Text",         name: "intro",          widget: "text" }
      - { label: "Hero-Bild",          name: "heroImage",      widget: "image", required: false }
      - label: "Vorteile / Benefits"
        name: "benefits"
        widget: "list"
        fields:
          - { label: "Titel",        name: "title",       widget: "string" }
          - { label: "Beschreibung", name: "description", widget: "text" }
      - label: "FAQ"
        name: "faq"
        widget: "list"
        fields:
          - { label: "Frage",   name: "question", widget: "string" }
          - { label: "Antwort", name: "answer",   widget: "text" }
      - label: "Interne Links"
        name: "internalLinks"
        widget: "list"
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "URL",   name: "href",  widget: "string" }
      - label: "Call-to-Action"
        name: "cta"
        widget: "object"
        fields:
          - { label: "Eyebrow",                name: "eyebrow",        widget: "string" }
          - { label: "Titel",                  name: "title",          widget: "string" }
          - { label: "Untertitel",             name: "subtitle",       widget: "text" }
          - { label: "Primärer Button — Text", name: "primaryLabel",   widget: "string" }
          - { label: "Primärer Button — URL",  name: "primaryHref",    widget: "string" }
          - { label: "Zweiter Button — Text",  name: "secondaryLabel", widget: "string", required: false }
          - { label: "Zweiter Button — URL",   name: "secondaryHref",  widget: "string", required: false }
      - label: "Verwandte Seiten"
        name: "related"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - label: "Verwandte Branchen"
            name: "branchen"
            widget: "list"
            required: false
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL",   name: "href",  widget: "string" }
          - label: "Verwandte Lösungen"
            name: "loesungen"
            widget: "list"
            required: false
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL",   name: "href",  widget: "string" }
          - label: "Verwandte Städte"
            name: "staedte"
            widget: "list"
            required: false
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL",   name: "href",  widget: "string" }

  # ───────────────────────────────────────────────────────────────
  # WISSEN
  # ───────────────────────────────────────────────────────────────
  - name: "wissen"
    label: "Wissen / Ratgeber"
    label_singular: "Wissensartikel"
    folder: "content/wissen"
    create: true
    delete: true
    extension: "json"
    format: "json"
    slug: "{{slug}}"
    summary: "{{h1}}"
    sortable_fields: ["h1", "datePublished"]
    fields:
      - { label: "Slug (URL-Pfad)", name: "slug", widget: "string", hint: "Wird zur URL: /wissen/<slug>." }
      - label: "Kategorie"
        name: "category"
        widget: "select"
        options: ["Grundlagen", "Software", "Kosten", "Branchen", "Outdoor & Mobile", "Events"]
      - { label: "SEO Titel",          name: "seoTitle",       widget: "string" }
      - { label: "SEO Beschreibung",   name: "seoDescription", widget: "text" }
      - { label: "Eyebrow",            name: "eyebrow",        widget: "string" }
      - { label: "Headline (H1)",      name: "h1",             widget: "string" }
      - { label: "Intro",              name: "intro",          widget: "text" }
      - { label: "In-Kürze / Definition", name: "definition", widget: "text", hint: "1–2 Sätze, farbiger Block oben." }
      - label: "Erklärungs-Absätze"
        name: "explanation"
        widget: "list"
        field: { label: "Absatz", name: "text", widget: "text" }
      - label: "Beispiele"
        name: "examples"
        widget: "list"
        fields:
          - { label: "Titel",        name: "title",       widget: "string" }
          - { label: "Beschreibung", name: "description", widget: "text" }
      - label: "Vorteile (Checkliste)"
        name: "benefits"
        widget: "list"
        field: { label: "Vorteil", name: "text", widget: "string" }
      - label: "FAQ"
        name: "faq"
        widget: "list"
        fields:
          - { label: "Frage",   name: "question", widget: "string" }
          - { label: "Antwort", name: "answer",   widget: "text" }
      - label: "Interne Links"
        name: "internalLinks"
        widget: "list"
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "URL",   name: "href",  widget: "string" }
      - { label: "Veröffentlichungsdatum", name: "datePublished", widget: "date", date_format: "YYYY-MM-DD" }
      - { label: "Letzte Änderung",        name: "dateModified",  widget: "date", date_format: "YYYY-MM-DD", required: false }

  # ───────────────────────────────────────────────────────────────
  # GLOBALE DATEN
  # ───────────────────────────────────────────────────────────────
  - name: "site"
    label: "Globale Daten"
    files:
      - file: "content/site/contact.json"
        label: "Kontaktdaten"
        name: "contact"
        format: "json"
        fields:
          - { label: "Ansprechperson — Name",  name: "name",         widget: "string" }
          - { label: "Ansprechperson — Rolle", name: "role",         widget: "string" }
          - { label: "Telefon (E.164)",        name: "phone",        widget: "string" }
          - { label: "Telefon (Anzeige)",      name: "phoneDisplay", widget: "string" }
          - { label: "E-Mail",                 name: "email",        widget: "string" }
          - { label: "WhatsApp-URL",           name: "whatsapp",     widget: "string" }
      - file: "content/site/homepage.json"
        label: "Homepage-Hero"
        name: "homepage"
        format: "json"
        fields:
          - { label: "Eyebrow",                 name: "eyebrow",         widget: "string" }
          - { label: "Headline Zeile 1",        name: "titleLine1",      widget: "string" }
          - { label: "Headline Zeile 2 (magenta)", name: "titleLine2",   widget: "string" }
          - { label: "Sub-Text",                name: "subtitle",        widget: "text" }
          - { label: "Primärer CTA — Text",     name: "primaryLabel",    widget: "string" }
          - { label: "Primärer CTA — URL",      name: "primaryHref",     widget: "string" }
          - { label: "Zweiter CTA — Text",      name: "secondaryLabel",  widget: "string", required: false }
          - { label: "Zweiter CTA — URL",       name: "secondaryHref",   widget: "string", required: false }

      - file: "content/site/homepage-benefits.json"
        label: "Homepage — Vorteile-Section"
        name: "homepage_benefits"
        format: "json"
        fields:
          - { label: "Eyebrow",   name: "eyebrow",  widget: "string" }
          - { label: "Titel",     name: "title",    widget: "string" }
          - { label: "Untertitel", name: "subtitle", widget: "text" }
          - label: "Hervorgehobene Karte"
            name: "featured"
            widget: "object"
            fields:
              - { label: "Icon (Name)", name: "icon",        widget: "string", hint: "z.B. sliders, layout-grid, shield-off, star, repeat-2, users" }
              - { label: "Titel",       name: "title",       widget: "string" }
              - { label: "Beschreibung", name: "description", widget: "text" }
              - { label: "Link-Text",   name: "linkLabel",   widget: "string", required: false }
              - { label: "Link-URL",    name: "linkHref",    widget: "string", required: false }
          - label: "Karten (4 Stück)"
            name: "cards"
            widget: "list"
            fields:
              - { label: "Icon (Name)",  name: "icon",        widget: "string" }
              - { label: "Titel",        name: "title",       widget: "string" }
              - { label: "Beschreibung", name: "description", widget: "text" }
          - label: "Dunkle CTA-Karte"
            name: "darkCta"
            widget: "object"
            fields:
              - { label: "Icon (Name)",  name: "icon",        widget: "string" }
              - { label: "Titel",        name: "title",       widget: "string" }
              - { label: "Beschreibung", name: "description", widget: "text" }
              - { label: "Button-Text",  name: "ctaLabel",    widget: "string" }
              - { label: "Button-URL",   name: "ctaHref",     widget: "string" }

      - file: "content/site/homepage-industries.json"
        label: "Homepage — Branchen-Kacheln"
        name: "homepage_industries"
        format: "json"
        fields:
          - label: "Kacheln (5 Stück empfohlen)"
            name: "items"
            widget: "list"
            fields:
              - { label: "Titel",        name: "title",       widget: "string" }
              - { label: "Beschreibung", name: "description", widget: "text" }
              - { label: "URL",          name: "href",        widget: "string" }
              - { label: "Bild",         name: "imageSrc",    widget: "image" }

      - file: "content/site/homepage-usecases.json"
        label: "Homepage — Use Cases (Editorial-Reihe)"
        name: "homepage_usecases"
        format: "json"
        fields:
          - label: "Use Cases"
            name: "items"
            widget: "list"
            fields:
              - { label: "Nummer (z.B. 01)",  name: "number",   widget: "string" }
              - { label: "Kategorie",         name: "category", widget: "string" }
              - { label: "Headline",          name: "headline", widget: "string" }
              - { label: "Body",              name: "body",     widget: "text" }
              - label: "Bullet-Liste"
                name: "bullets"
                widget: "list"
                field: { label: "Bullet", name: "text", widget: "string" }
              - label: "CTA"
                name: "cta"
                widget: "object"
                fields:
                  - { label: "Text", name: "label", widget: "string" }
                  - { label: "URL",  name: "href",  widget: "string" }
              - { label: "Bild",     name: "imageSrc", widget: "image" }
              - { label: "Bild Alt-Text", name: "imageAlt", widget: "string" }

      - file: "content/site/footer.json"
        label: "Footer"
        name: "footer"
        format: "json"
        fields:
          - label: "Spalte Lösungen"
            name: "loesungen"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL",   name: "href",  widget: "string" }
          - label: "Spalte Branchen"
            name: "branchen"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL",   name: "href",  widget: "string" }
          - label: "Spalte Unternehmen"
            name: "unternehmen"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL",   name: "href",  widget: "string" }
          - label: "Social-Links"
            name: "socials"
            widget: "object"
            fields:
              - { label: "LinkedIn-URL",  name: "linkedin",  widget: "string" }
              - { label: "Instagram-URL", name: "instagram", widget: "string" }

      - file: "content/site/kosten-faq.json"
        label: "Kostenseite — FAQ"
        name: "kosten_faq"
        format: "json"
        fields:
          - label: "Fragen"
            name: "items"
            widget: "list"
            fields:
              - { label: "Frage",   name: "question", widget: "string" }
              - { label: "Antwort", name: "answer",   widget: "text" }

      - file: "content/site/ueber-uns.json"
        label: "Über uns — Komplettinhalt"
        name: "ueber_uns"
        format: "json"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow",   name: "eyebrow",  widget: "string" }
              - { label: "Titel",     name: "title",    widget: "string" }
              - { label: "Untertitel", name: "subtitle", widget: "text" }
              - label: "Bullets (3)"
                name: "bullets"
                widget: "list"
                field: { label: "Bullet", name: "text", widget: "string" }
              - label: "Primärer CTA"
                name: "primaryCta"
                widget: "object"
                fields:
                  - { label: "Text", name: "label", widget: "string" }
                  - { label: "URL",  name: "href",  widget: "string" }
              - label: "Zweiter CTA"
                name: "secondaryCta"
                widget: "object"
                fields:
                  - { label: "Text", name: "label", widget: "string" }
                  - { label: "URL",  name: "href",  widget: "string" }
          - label: "Story-Section"
            name: "story"
            widget: "object"
            fields:
              - { label: "Eyebrow",    name: "eyebrow",   widget: "string" }
              - { label: "Titel",      name: "title",     widget: "string" }
              - { label: "Untertitel", name: "subtitle",  widget: "text" }
              - label: "Proof-Punkte (4)"
                name: "proofItems"
                widget: "list"
                fields:
                  - { label: "Metric / Wort",   name: "metric",      widget: "string" }
                  - { label: "Titel",           name: "title",       widget: "string" }
                  - { label: "Beschreibung",    name: "description", widget: "text" }
          - label: "Arbeitsweise (Problem/Lösung)"
            name: "arbeitsweise"
            widget: "object"
            fields:
              - { label: "Eyebrow",          name: "eyebrow",         widget: "string" }
