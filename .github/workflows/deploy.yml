name: Deploy to Novatrend

on:
  push:
    branches:
      - main
  # Allow other workflows (e.g. Publish Scheduled News) to trigger a deploy
  # via the API. workflow_dispatch is the documented exception that CAN be
  # triggered using the default GITHUB_TOKEN.
  workflow_dispatch:
    inputs:
      publish_slugs:
        description: "Comma-separated news slugs just published — shared to LinkedIn/Instagram after deploy."
        required: false
        default: ""

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: ${{ secrets.FTP_PATH }}

      # Only fires when dispatched with publish_slugs (i.e. from the Tuesday
      # auto-publish). Runs AFTER FTP so the post page and its /social/<slug>.jpg
      # are live when LinkedIn and Instagram fetch them.
      - name: Share new posts to LinkedIn + Instagram
        if: ${{ github.event.inputs.publish_slugs != '' }}
        env:
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          PUBLISH_SLUGS: ${{ github.event.inputs.publish_slugs }}
        run: node scripts/notify-social.mjs
