name: Publish Scheduled News

# Runs every Tuesday at 04:00 UTC = 06:00 CEST (Apr–Oct) / 05:00 CET (Nov–Mar).
# For year-round 06:00 local time, GitHub-Cron is UTC-only; small DST drift accepted.
on:
  schedule:
    - cron: "0 4 * * 2"
  workflow_dispatch:  # allow manual run via GitHub UI ("Run workflow")

permissions:
  contents: write  # so the job can push back the commit

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          # Use default GITHUB_TOKEN for push back
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Flip scheduled → published for due posts
        run: node scripts/publish-scheduled-news.mjs

      - name: Commit and push if anything changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "Nothing to publish today. Exiting cleanly."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add content/news/
          git commit -m "[scheduled-publish] News: due posts auto-published"
          git push origin main

          echo "Pushed scheduled news to main. The deploy workflow will pick it up."
