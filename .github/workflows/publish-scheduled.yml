name: Publish Scheduled News

# Runs every Tuesday at ~04:07 UTC = 06:07 CEST (Apr–Oct) / 05:07 CET (Nov–Mar).
# Minute is offset from :00 on purpose: GitHub's scheduled runs at the top of
# the hour are the most heavily congested and are frequently delayed or dropped.
# GitHub-Cron is UTC-only; small DST drift accepted.
on:
  schedule:
    - cron: "7 4 * * 2"
  workflow_dispatch:  # allow manual run via GitHub UI ("Run workflow")

permissions:
  contents: write  # so the job can push back the commit
  actions: write   # so the job can dispatch the Deploy workflow

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 1
          # Use default GITHUB_TOKEN for push back
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20

      - name: Flip scheduled → published for due posts
        id: publish
        run: node scripts/publish-scheduled-news.mjs

      - name: Commit and push if anything changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "Nothing to publish today. Exiting cleanly."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add content/news/
          git commit -m "[scheduled-publish] News: due posts auto-published"
          git push origin main

          # A push made with the default GITHUB_TOKEN does NOT trigger other
          # workflows (GitHub's anti-recursion rule), so deploy.yml's `on: push`
          # would never fire here. Dispatch it explicitly instead — workflow_dispatch
          # is allowed with GITHUB_TOKEN and only runs when we actually published.
          # Pass the just-published slugs so deploy.yml can notify the Make webhook
          # (→ LinkedIn / Instagram) AFTER the site is live.
          gh workflow run deploy.yml --ref main -f publish_slugs="${{ steps.publish.outputs.published_slugs }}"
          echo "Pushed scheduled news to main and dispatched the Deploy workflow."
